<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音声タイマー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 560px;
      padding: 32px 24px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #aaa;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 32px;
      text-align: center;
    }

    /* Clock display */
    .clock {
      text-align: center;
      margin-bottom: 40px;
    }

    .clock-time {
      font-size: 72px;
      font-weight: 200;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
      color: #fff;
    }

    .clock-date {
      font-size: 14px;
      color: #666;
      margin-top: 6px;
    }

    /* Card */
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .card-label {
      font-size: 12px;
      color: #666;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* Time picker */
    .time-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .time-input {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 28px;
      font-weight: 300;
      padding: 12px 16px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .time-input:focus {
      border-color: #555;
    }

    /* Countdown */
    .countdown-display {
      text-align: center;
      padding: 16px 0;
    }

    .countdown-value {
      font-size: 48px;
      font-weight: 200;
      color: #4ade80;
      font-variant-numeric: tabular-nums;
      letter-spacing: -1px;
      transition: color 0.3s;
    }

    .countdown-value.warning { color: #facc15; }
    .countdown-value.alarm   { color: #f87171; }
    .countdown-value.idle    { color: #444; }

    .countdown-label {
      font-size: 13px;
      color: #555;
      margin-top: 4px;
    }

    /* Audio file */
    .file-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .file-btn {
      background: #222;
      border: 1px dashed #444;
      border-radius: 10px;
      color: #aaa;
      cursor: pointer;
      font-size: 13px;
      padding: 10px 16px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .file-btn:hover { border-color: #666; color: #fff; }

    .file-name {
      font-size: 13px;
      color: #777;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    input[type="file"] { display: none; }

    /* Volume */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .vol-label { font-size: 13px; color: #666; min-width: 28px; }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      background: #333;
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
    }

    .vol-value { font-size: 13px; color: #666; min-width: 36px; text-align: right; }

    /* Loop */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-label { font-size: 14px; color: #ccc; }

    .toggle {
      position: relative;
      width: 44px; height: 24px;
      cursor: pointer;
    }

    .toggle input { display: none; }

    .toggle-track {
      position: absolute; inset: 0;
      background: #333;
      border-radius: 12px;
      transition: background 0.2s;
    }

    .toggle input:checked + .toggle-track { background: #4ade80; }

    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 18px; height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      padding: 14px;
      transition: all 0.15s;
    }

    .btn-start {
      background: #fff;
      color: #000;
    }

    .btn-start:hover { background: #e0e0e0; }

    .btn-stop {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #aaa;
    }

    .btn-stop:hover { border-color: #666; color: #fff; }

    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Status */
    .status {
      text-align: center;
      font-size: 13px;
      color: #555;
      min-height: 20px;
      margin-top: 8px;
    }

    /* Alarm overlay */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .overlay.active { display: flex; }

    .alarm-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 40px 48px;
      text-align: center;
      animation: pulse 1s infinite alternate;
    }

    @keyframes pulse {
      from { box-shadow: 0 0 0 0 rgba(248,113,113,0); }
      to   { box-shadow: 0 0 40px 4px rgba(248,113,113,0.3); }
    }

    .alarm-icon { font-size: 48px; margin-bottom: 16px; }
    .alarm-title { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    .alarm-time  { font-size: 15px; color: #777; margin-bottom: 28px; }

    .btn-dismiss {
      background: #f87171;
      border: none;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 32px;
    }

    .btn-dismiss:hover { background: #ef4444; }

    /* Entries list */
    .entries {
      margin-top: 8px;
    }

    .entry-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #141414;
      border: 1px solid #232323;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .entry-time { font-weight: 500; color: #fff; min-width: 60px; }
    .entry-file { color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; margin: 0 12px; }
    .entry-status { font-size: 12px; color: #4ade80; min-width: 40px; text-align: right; }
    .entry-status.done { color: #555; }

    .entry-del {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 16px;
      padding: 0 0 0 10px;
      transition: color 0.15s;
    }

    .entry-del:hover { color: #f87171; }

    .no-entries { font-size: 13px; color: #444; text-align: center; padding: 16px 0; }
  </style>
</head>
<body>

<div class="container">
  <h1>Audio Timer</h1>

  <!-- Current time -->
  <div class="clock">
    <div class="clock-time" id="clockTime">--:--:--</div>
    <div class="clock-date" id="clockDate"></div>
  </div>

  <!-- Set time -->
  <div class="card">
    <div class="card-label">再生時刻</div>
    <div class="time-row">
      <input type="time" id="targetTime" class="time-input" step="1">
    </div>
  </div>

  <!-- Audio file -->
  <div class="card">
    <div class="card-label">音声ファイル</div>
    <div class="file-area">
      <label class="file-btn" for="audioFile">ファイル選択</label>
      <input type="file" id="audioFile" accept="audio/*,video/*">
      <span class="file-name" id="fileName">未選択（ビープ音を使用）</span>
    </div>
  </div>

  <!-- Volume & loop -->
  <div class="card">
    <div class="card-label" style="margin-bottom:16px;">オプション</div>
    <div class="volume-row" style="margin-bottom:16px;">
      <span class="vol-label">🔊</span>
      <input type="range" id="volume" min="0" max="100" value="80">
      <span class="vol-value" id="volDisplay">80%</span>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">ループ再生</span>
      <label class="toggle">
        <input type="checkbox" id="loopToggle">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
  </div>

  <!-- Countdown -->
  <div class="card">
    <div class="card-label">カウントダウン</div>
    <div class="countdown-display">
      <div class="countdown-value idle" id="countdownValue">--:--:--</div>
      <div class="countdown-label" id="countdownLabel">タイマーを開始してください</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="btn-row">
    <button class="btn btn-start" id="btnAdd">タイマー追加</button>
    <button class="btn btn-stop" id="btnStopAll" disabled>すべて停止</button>
  </div>
  <div class="status" id="status"></div>

  <!-- Entry list -->
  <div class="card" style="margin-top:16px;" id="entriesCard">
    <div class="card-label">スケジュール</div>
    <div class="entries" id="entriesList">
      <div class="no-entries">タイマーがありません</div>
    </div>
  </div>
</div>

<!-- Alarm overlay -->
<div class="overlay" id="overlay">
  <div class="alarm-box">
    <div class="alarm-icon">🔔</div>
    <div class="alarm-title" id="alarmTitle">時刻になりました</div>
    <div class="alarm-time"  id="alarmDetail"></div>
    <button class="btn-dismiss" id="btnDismiss">停止</button>
  </div>
</div>

<audio id="audioPlayer"></audio>

<script>
  // ---- State ----
  let timers = [];      // { id, targetHH, targetMM, targetSS, fileName, audioSrc, volume, loop }
  let activeAudio = null;
  let tickInterval = null;
  let audioFile = null;
  let audioSrc = null;

  const WEEKDAYS = ['日','月','火','水','木','金','土'];

  // ---- DOM refs ----
  const clockTime     = document.getElementById('clockTime');
  const clockDate     = document.getElementById('clockDate');
  const targetTime    = document.getElementById('targetTime');
  const audioFileEl   = document.getElementById('audioFile');
  const fileNameEl    = document.getElementById('fileName');
  const volumeEl      = document.getElementById('volume');
  const volDisplay    = document.getElementById('volDisplay');
  const loopToggle    = document.getElementById('loopToggle');
  const countdownValue= document.getElementById('countdownValue');
  const countdownLabel= document.getElementById('countdownLabel');
  const btnAdd        = document.getElementById('btnAdd');
  const btnStopAll    = document.getElementById('btnStopAll');
  const statusEl      = document.getElementById('status');
  const entriesList   = document.getElementById('entriesList');
  const overlay       = document.getElementById('overlay');
  const alarmTitle    = document.getElementById('alarmTitle');
  const alarmDetail   = document.getElementById('alarmDetail');
  const btnDismiss    = document.getElementById('btnDismiss');
  const audioPlayer   = document.getElementById('audioPlayer');

  // ---- Clock ----
  function updateClock() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    clockTime.textContent = `${hh}:${mm}:${ss}`;
    const wd = WEEKDAYS[now.getDay()];
    clockDate.textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${wd}）`;
  }

  // ---- Countdown for first pending timer ----
  function updateCountdown() {
    const now = new Date();
    const pending = timers.filter(t => !t.fired);

    if (pending.length === 0) {
      countdownValue.textContent = '--:--:--';
      countdownValue.className = 'countdown-value idle';
      countdownLabel.textContent = timers.length > 0 ? 'すべて完了' : 'タイマーを追加してください';
      return;
    }

    // nearest timer
    const t = pending.reduce((a, b) => secsUntil(a) <= secsUntil(b) ? a : b);
    const secs = secsUntil(t);

    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    countdownValue.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    countdownLabel.textContent = `${t.targetHH}:${t.targetMM}:${t.targetSS} に再生`;

    if (secs <= 10) countdownValue.className = 'countdown-value alarm';
    else if (secs <= 60) countdownValue.className = 'countdown-value warning';
    else countdownValue.className = 'countdown-value';
  }

  function secsUntil(t) {
    const now = new Date();
    let target = new Date(now);
    target.setHours(parseInt(t.targetHH), parseInt(t.targetMM), parseInt(t.targetSS), 0);
    if (target <= now) target.setDate(target.getDate() + 1);
    return Math.round((target - now) / 1000);
  }

  // ---- Beep (fallback) ----
  function createBeep() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    gain.gain.setValueAtTime(volumeEl.value / 100 * 0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
    osc.start();
    osc.stop(ctx.currentTime + 1.5);
    return { stop: () => { try { osc.stop(); ctx.close(); } catch(e){} } };
  }

  // ---- Fire timer ----
  function fireTimer(t) {
    t.fired = true;
    renderEntries();

    alarmTitle.textContent = '時刻になりました';
    alarmDetail.textContent = `${t.targetHH}:${t.targetMM}:${t.targetSS}  —  ${t.fileName}`;
    overlay.classList.add('active');

    if (t.audioSrc) {
      audioPlayer.src = t.audioSrc;
      audioPlayer.volume = t.volume / 100;
      audioPlayer.loop = t.loop;
      audioPlayer.play().catch(() => {});
      activeAudio = { type: 'file' };
    } else {
      // beep loop
      let beepRef = createBeep();
      let beepTimer = null;
      if (t.loop) {
        beepTimer = setInterval(() => { beepRef = createBeep(); }, 2000);
      }
      activeAudio = { type: 'beep', ref: beepRef, timer: beepTimer };
    }

    btnStopAll.disabled = false;
    setStatus(`${t.targetHH}:${t.targetMM}:${t.targetSS} — 再生中`);
  }

  function stopAudio() {
    if (activeAudio) {
      if (activeAudio.type === 'file') {
        audioPlayer.pause();
        audioPlayer.currentTime = 0;
      } else {
        if (activeAudio.ref) activeAudio.ref.stop();
        if (activeAudio.timer) clearInterval(activeAudio.timer);
      }
      activeAudio = null;
    }
    overlay.classList.remove('active');
  }

  // ---- Tick (every second) ----
  function tick() {
    updateClock();
    updateCountdown();

    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');

    timers.forEach(t => {
      if (!t.fired && t.targetHH === hh && t.targetMM === mm && t.targetSS === ss) {
        fireTimer(t);
      }
    });
  }

  // ---- Render entries ----
  function renderEntries() {
    if (timers.length === 0) {
      entriesList.innerHTML = '<div class="no-entries">タイマーがありません</div>';
      btnStopAll.disabled = true;
      return;
    }
    btnStopAll.disabled = false;
    entriesList.innerHTML = '';
    timers.slice().sort((a,b) => {
      const ta = a.targetHH+a.targetMM+a.targetSS;
      const tb = b.targetHH+b.targetMM+b.targetSS;
      return ta < tb ? -1 : 1;
    }).forEach(t => {
      const el = document.createElement('div');
      el.className = 'entry-item';
      el.innerHTML = `
        <span class="entry-time">${t.targetHH}:${t.targetMM}:${t.targetSS}</span>
        <span class="entry-file">${t.fileName}</span>
        <span class="entry-status${t.fired ? ' done' : ''}">${t.fired ? '完了' : '待機中'}</span>
        <button class="entry-del" data-id="${t.id}" title="削除">✕</button>
      `;
      entriesList.appendChild(el);
    });
  }

  function setStatus(msg) {
    statusEl.textContent = msg;
  }

  // ---- Events ----
  audioFileEl.addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    audioFile = f;
    audioSrc = URL.createObjectURL(f);
    fileNameEl.textContent = f.name;
  });

  volumeEl.addEventListener('input', () => {
    volDisplay.textContent = volumeEl.value + '%';
  });

  btnAdd.addEventListener('click', () => {
    const val = targetTime.value;
    if (!val) { setStatus('時刻を入力してください'); return; }

    const parts = val.split(':');
    const hh = parts[0];
    const mm = parts[1];
    const ss = parts[2] || '00';

    // check duplicate
    if (timers.find(t => t.targetHH===hh && t.targetMM===mm && t.targetSS===ss && !t.fired)) {
      setStatus('同じ時刻のタイマーが既に存在します');
      return;
    }

    const timer = {
      id: Date.now(),
      targetHH: hh,
      targetMM: mm,
      targetSS: ss,
      fileName: audioFile ? audioFile.name : 'ビープ音',
      audioSrc: audioSrc,
      volume: parseInt(volumeEl.value),
      loop: loopToggle.checked,
      fired: false,
    };

    timers.push(timer);
    renderEntries();
    setStatus(`${hh}:${mm}:${ss} にタイマーを設定しました`);
  });

  btnStopAll.addEventListener('click', () => {
    stopAudio();
    timers = [];
    renderEntries();
    setStatus('すべて停止しました');
  });

  btnDismiss.addEventListener('click', () => {
    stopAudio();
    // remove only fired timers from display (keep pending)
    timers = timers.filter(t => !t.fired);
    if (timers.length === 0) btnStopAll.disabled = true;
    renderEntries();
    setStatus('');
  });

  entriesList.addEventListener('click', e => {
    const btn = e.target.closest('.entry-del');
    if (!btn) return;
    const id = parseInt(btn.dataset.id);
    timers = timers.filter(t => t.id !== id);
    renderEntries();
  });

  // ---- Default time = now + 1 min ----
  function setDefaultTime() {
    const d = new Date(Date.now() + 60000);
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    const ss = String(d.getSeconds()).padStart(2,'0');
    targetTime.value = `${hh}:${mm}:${ss}`;
  }

  // ---- Init ----
  setDefaultTime();
  updateClock();
  renderEntries();
  tickInterval = setInterval(tick, 1000);
</script>
</body>
</html>
